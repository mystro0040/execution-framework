# What phases and tasks are called in this domain
phase_type = Phase
task_type = Task

[execution]
# Excluded log filenames (comma-separated)
excluded_files = 00_progress_tracker.md, 00_master_log.md, execution_temp_log.md

[contacts]
# Role labels used in the report contact section
client_role = Client
lead_role = Project Lead
