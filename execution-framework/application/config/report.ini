[output]
# Base filename for all generated reports (no extension)
filename = Execution_Report
# Title displayed on the report cover page
title = Execution Report & Deliverable

[sections]
# Five human-authored DRAFTS sections — key is used in the DRAFTS file,
# label is what appears as the heading in the generated report.
section_1_key   = EXECUTIVE_SUMMARY
section_1_label = Executive Summary

section_2_key   = KEY_FINDINGS
section_2_label = Key Findings

section_3_key   = METHODOLOGY_NOTES
section_3_label = Methodology Notes

section_4_key   = RESULTS_ANALYSIS
section_4_label = Results & Analysis

section_5_key   = RECOMMENDATIONS
section_5_label = Recommendations & Next Steps

[scope]
# Labels for the scope/assessment section of the report
assessment_type_label   = Project Type
default_assessment_type = General Execution
