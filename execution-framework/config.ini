# Framework topology — the single source of truth for WHERE things live.
# Two roots keep the shipped product separate from a live engagement:
#   application/  -> ships with the tool (engine config + YAML methodology source)
#   engagement/   -> the active workspace (your per-job data, execution, reports)
# Rename either folder here and every utility follows — no code edits.
[topology]
application_dir = application
workspace_dir = engagement
# subfolder under application/ that holds the YAML methodology database (methodology_yaml/)
app_data_dir = data

[blue_team_integration]
enabled = false
blue_team_framework_path =
